name: Build APK

on:
  push:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            git zip unzip \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev \
            cmake libffi-dev libssl-dev \
            libltdl-dev build-essential

          python -m pip install --upgrade pip
          pip install cython==0.29.37 buildozer

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Install Android SDK components
        run: |
          sdkmanager "platform-tools"
          sdkmanager "platforms;android-33"
          sdkmanager "build-tools;34.0.0"
          sdkmanager "ndk;25.2.9519653"

      - name: Add sdkmanager compatibility path for Buildozer
        run: |
          set -euxo pipefail
          mkdir -p "$ANDROID_SDK_ROOT/tools/bin"
          SDKMANAGER_BIN="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER_BIN" ]; then
            SDKMANAGER_BIN="$ANDROID_SDK_ROOT/cmdline-tools/16.0/bin/sdkmanager"
          fi
          ln -sfn "$SDKMANAGER_BIN" "$ANDROID_SDK_ROOT/tools/bin/sdkmanager"
          "$ANDROID_SDK_ROOT/tools/bin/sdkmanager" --version

      - name: Link SDK for Buildozer
        run: |
          set -euxo pipefail
          mkdir -p "$HOME/.buildozer/android/platform"
          ln -sfn "$ANDROID_SDK_ROOT" "$HOME/.buildozer/android/platform/android-sdk"

      - name: Build APK
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROIDSDK: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653
          ANDROIDNDK: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653
        run: |
          set -euxo pipefail
          ls -la "$ANDROIDSDK/build-tools/34.0.0"
          "$ANDROIDSDK/build-tools/34.0.0/aidl" --version || true
          buildozer -v android debug 2>&1 | tee build.log

      - name: Show generated APKs
        run: find . -iname "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: |
            bin/*.apk
            **/*.apk

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
